
# Mah Jong online game -- production deployment
# Run with: docker compose up -d
#
# Prerequisites:
#   1. Copy .env.example to .env and set GAME_PASSWORD and CF_DNS_API_TOKEN.
#   2. Point mj.adamsmith.cv at this server's IP (proxied via Cloudflare).
#   3. Caddy obtains/renews TLS certs via the Cloudflare DNS-01 challenge.

services:
  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3 (QUIC)
    environment:
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data         # persists TLS certs across restarts
      - caddy_config:/config
    extra_hosts:
      - "host.docker.internal:host-gateway"      
    depends_on:
      - game-server
    networks:
      - default
  game-server:
    build: .
    restart: unless-stopped
    env_file: .env             # GAME_PASSWORD and PORT live here

volumes:
  caddy_data:
  caddy_config:

networks:
  web-proxy:
    external: true
